<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover"/>
<meta name="theme-color" content="#040a14"/>
<title>Attic · access</title>
<style>
  :root{ --jv:#36e2ff; --jv2:#7df0c8; --bg:#040a14; }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:var(--bg);color:#cfeefb;font-family:"Segoe UI",system-ui,sans-serif;overflow:hidden}
  #stars{position:fixed;inset:0;z-index:0}
  .wrap{position:relative;z-index:1;height:100%;display:flex;align-items:center;justify-content:center;padding:24px}
  .panel{width:min(440px,92vw);text-align:center;padding:42px 32px;border:1px solid rgba(54,226,255,.22);border-radius:20px;
    background:linear-gradient(180deg,rgba(10,22,38,.78),rgba(6,14,26,.88));backdrop-filter:blur(12px);
    box-shadow:0 0 70px rgba(54,226,255,.12),inset 0 0 30px rgba(54,226,255,.05);animation:rise .7s cubic-bezier(.2,.8,.2,1)}
  @keyframes rise{from{opacity:0;transform:translateY(20px) scale(.98)}to{opacity:1;transform:none}}
  .ring{width:104px;height:104px;margin:0 auto 20px;border-radius:50%;position:relative}
  .ring::before,.ring::after{content:"";position:absolute;inset:0;border-radius:50%;border:2px solid transparent}
  .ring::before{border-top-color:var(--jv);border-right-color:var(--jv);animation:spin 2.4s linear infinite;box-shadow:0 0 26px var(--jv)}
  .ring::after{inset:15px;border-bottom-color:var(--jv2);opacity:.7;animation:spin 1.5s linear infinite reverse}
  .ring i{position:absolute;inset:32px;border-radius:50%;background:radial-gradient(circle,var(--jv),transparent 70%);animation:pulse 2s ease-in-out infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  @keyframes pulse{0%,100%{opacity:.5;transform:scale(.9)}50%{opacity:1;transform:scale(1.08)}}
  h1{margin:.2em 0 .05em;font-size:1.4rem;letter-spacing:.28em;font-weight:700;color:#eafaff;text-indent:.28em}
  h1 b{font-weight:300;color:var(--jv)}
  .sub{margin:0 0 22px;font-size:.68rem;letter-spacing:.34em;color:rgba(125,210,240,.55);text-transform:uppercase}
  #pad{touch-action:none;margin:6px auto 2px;display:block;cursor:pointer}
  .hint{margin:4px 0 0;font-size:.66rem;letter-spacing:.22em;color:rgba(125,210,240,.5);text-transform:uppercase}
  .err{min-height:18px;margin-top:13px;font-size:.74rem;letter-spacing:.08em;color:#ff7d8a}
</style>
</head>
<body>
<canvas id="stars"></canvas>
<div class="wrap">
  <div class="panel">
    <div class="ring"><i></i></div>
    <h1>THE <b>ATTIC</b></h1>
    <p class="sub" id="sub">Draw to unlock</p>

    <canvas id="pad" width="280" height="280"></canvas>
    <p class="hint">Draw your pattern</p>

    <div class="err" id="e"></div>
  </div>
</div>
<script>
  const c=document.getElementById('stars'),x=c.getContext('2d');let W,H,st=[];
  function rs(){W=c.width=innerWidth;H=c.height=innerHeight;st=Array.from({length:140},()=>({x:Math.random()*W,y:Math.random()*H,z:Math.random()*.8+.2,s:Math.random()*1.5+.2}));}
  rs();addEventListener('resize',rs);
  (function loop(){x.clearRect(0,0,W,H);for(const s of st){s.y+=s.z*.25;if(s.y>H){s.y=0;s.x=Math.random()*W;}x.globalAlpha=s.z;x.fillStyle='#36e2ff';x.fillRect(s.x,s.y,s.s,s.s);}x.globalAlpha=1;requestAnimationFrame(loop);})();
  const e=document.getElementById('e');

  // ---- pattern pad (dots 1-9, phone-keypad layout) ----
  const pad=document.getElementById('pad'),pc=pad.getContext('2d');
  const S=280,M=46,GAP=(S-2*M)/2,R=26;
  const dots=[];for(let r=0;r<3;r++)for(let col=0;col<3;col++)dots.push({n:r*3+col+1,x:M+col*GAP,y:M+r*GAP});
  let sel=[],drawing=false;

  function drawPad(seq,curPt){
    pc.clearRect(0,0,S,S);
    pc.lineCap='round';pc.lineJoin='round';
    if(seq.length){
      pc.strokeStyle='rgba(54,226,255,.85)';pc.lineWidth=5;pc.shadowColor='#36e2ff';pc.shadowBlur=14;
      pc.beginPath();
      for(let i=0;i<seq.length;i++){const d=dots[seq[i]-1];i?pc.lineTo(d.x,d.y):pc.moveTo(d.x,d.y);}
      if(curPt)pc.lineTo(curPt.x,curPt.y);
      pc.stroke();pc.shadowBlur=0;
    }
    for(const d of dots){
      const active=seq.includes(d.n);
      pc.beginPath();pc.arc(d.x,d.y,active?9:6,0,7);
      pc.fillStyle=active?'#7df0c8':'rgba(125,210,240,.4)';pc.fill();
      if(active){pc.beginPath();pc.arc(d.x,d.y,R,0,7);pc.strokeStyle='rgba(54,226,255,.4)';pc.lineWidth=2;pc.stroke();}
    }
  }
  function hit(x,y){ for(const d of dots){ if((x-d.x)**2+(y-d.y)**2<=R*R) return d.n; } return 0; }
  function pos(ev){ const r=pad.getBoundingClientRect(),t=ev.touches&&ev.touches[0]; const cx=(t?t.clientX:ev.clientX),cy=(t?t.clientY:ev.clientY); return {x:(cx-r.left)*S/r.width,y:(cy-r.top)*S/r.height}; }

  function start(ev){ ev.preventDefault();drawing=true;sel=[];const q=pos(ev);const n=hit(q.x,q.y);if(n)sel.push(n);drawPad(sel,q); }
  function move(ev){ if(!drawing)return;ev.preventDefault();const q=pos(ev);const n=hit(q.x,q.y);if(n&&!sel.includes(n))sel.push(n);drawPad(sel,q); }
  function end(){ if(!drawing)return;drawing=false;drawPad(sel);if(sel.length>=4)submit(sel.join(''));else if(sel.length){e.textContent='Pattern too short.';setTimeout(()=>{sel=[];drawPad([]);e.textContent='';},600);} }

  pad.addEventListener('pointerdown',start);
  pad.addEventListener('pointermove',move);
  window.addEventListener('pointerup',end);
  drawPad([]);

  async function submit(pattern){
    e.textContent='';
    try{
      const r=await fetch('/api/auth',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({pattern})});
      if(r.ok){e.style.color='#7df0c8';e.textContent='Access granted.';location.href='/';return;}
      const j=await r.json().catch(()=>({}));
      e.textContent = j.error==='locked' ? 'Locked — too many attempts.' : 'Pattern not recognized.';
    }catch{ e.textContent='Network error.'; }
    sel=[];drawPad([]);
  }
</script>
</body>
</html>
