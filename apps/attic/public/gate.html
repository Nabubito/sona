<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover"/>
<meta name="theme-color" content="#040a14"/>
<title>Attic · access</title>
<style>
  :root{ --jv:#36e2ff; --jv2:#7df0c8; --bg:#040a14; }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:var(--bg);color:#cfeefb;font-family:"Segoe UI",system-ui,sans-serif;overflow:hidden}
  #stars{position:fixed;inset:0;z-index:0}
  .wrap{position:relative;z-index:1;height:100%;display:flex;align-items:center;justify-content:center;padding:24px}
  .panel{width:min(440px,92vw);text-align:center;padding:42px 32px;border:1px solid rgba(54,226,255,.22);border-radius:20px;
    background:linear-gradient(180deg,rgba(10,22,38,.78),rgba(6,14,26,.88));backdrop-filter:blur(12px);
    box-shadow:0 0 70px rgba(54,226,255,.12),inset 0 0 30px rgba(54,226,255,.05);animation:rise .7s cubic-bezier(.2,.8,.2,1)}
  @keyframes rise{from{opacity:0;transform:translateY(20px) scale(.98)}to{opacity:1;transform:none}}
  .ring{width:104px;height:104px;margin:0 auto 20px;border-radius:50%;position:relative}
  .ring::before,.ring::after{content:"";position:absolute;inset:0;border-radius:50%;border:2px solid transparent}
  .ring::before{border-top-color:var(--jv);border-right-color:var(--jv);animation:spin 2.4s linear infinite;box-shadow:0 0 26px var(--jv)}
  .ring::after{inset:15px;border-bottom-color:var(--jv2);opacity:.7;animation:spin 1.5s linear infinite reverse}
  .ring i{position:absolute;inset:32px;border-radius:50%;background:radial-gradient(circle,var(--jv),transparent 70%);animation:pulse 2s ease-in-out infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  @keyframes pulse{0%,100%{opacity:.5;transform:scale(.9)}50%{opacity:1;transform:scale(1.08)}}
  h1{margin:.2em 0 .05em;font-size:1.4rem;letter-spacing:.28em;font-weight:700;color:#eafaff;text-indent:.28em}
  h1 b{font-weight:300;color:var(--jv)}
  .sub{margin:0 0 20px;font-size:.68rem;letter-spacing:.34em;color:rgba(125,210,240,.55);text-transform:uppercase}
  .dots{display:flex;gap:15px;justify-content:center;margin:6px 0 24px}
  .dots i{width:13px;height:13px;border-radius:50%;border:1.5px solid rgba(54,226,255,.5);transition:all .18s}
  .dots i.on{background:var(--jv2);border-color:var(--jv2);box-shadow:0 0 12px var(--jv2)}
  .pad{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;max-width:300px;margin:0 auto}
  .key{aspect-ratio:1/1;display:flex;align-items:center;justify-content:center;font-size:1.5rem;font-weight:500;color:#eafaff;
    border:1px solid rgba(54,226,255,.22);border-radius:16px;background:linear-gradient(180deg,rgba(20,40,64,.5),rgba(10,22,38,.35));
    cursor:pointer;user-select:none;transition:all .13s;-webkit-tap-highlight-color:transparent}
  .key:hover{border-color:rgba(54,226,255,.55);box-shadow:0 0 18px rgba(54,226,255,.18)}
  .key:active{transform:scale(.94);background:rgba(54,226,255,.14)}
  .key.fn{font-size:.72rem;letter-spacing:.14em;color:var(--jv);text-transform:uppercase}
  .err{min-height:18px;margin-top:16px;font-size:.74rem;letter-spacing:.08em;color:#ff7d8a}
</style>
</head>
<body>
<canvas id="stars"></canvas>
<div class="wrap">
  <div class="panel">
    <div class="ring"><i></i></div>
    <h1>THE <b>ATTIC</b></h1>
    <p class="sub">Enter passcode</p>

    <div class="dots" id="dots"><i></i><i></i><i></i><i></i></div>
    <div class="pad" id="pad">
      <div class="key" data-k="1">1</div><div class="key" data-k="2">2</div><div class="key" data-k="3">3</div>
      <div class="key" data-k="4">4</div><div class="key" data-k="5">5</div><div class="key" data-k="6">6</div>
      <div class="key" data-k="7">7</div><div class="key" data-k="8">8</div><div class="key" data-k="9">9</div>
      <div class="key fn" data-k="clr">Clr</div><div class="key" data-k="0">0</div><div class="key fn" data-k="del">Del</div>
    </div>

    <div class="err" id="e"></div>
  </div>
</div>
<script>
  const c=document.getElementById('stars'),x=c.getContext('2d');let W,H,st=[];
  function rs(){W=c.width=innerWidth;H=c.height=innerHeight;st=Array.from({length:140},()=>({x:Math.random()*W,y:Math.random()*H,z:Math.random()*.8+.2,s:Math.random()*1.5+.2}));}
  rs();addEventListener('resize',rs);
  (function loop(){x.clearRect(0,0,W,H);for(const s of st){s.y+=s.z*.25;if(s.y>H){s.y=0;s.x=Math.random()*W;}x.globalAlpha=s.z;x.fillStyle='#36e2ff';x.fillRect(s.x,s.y,s.s,s.s);}x.globalAlpha=1;requestAnimationFrame(loop);})();

  const e=document.getElementById('e'), dotsEl=document.getElementById('dots');
  const LEN=4; let code='';
  function render(){ dotsEl.querySelectorAll('i').forEach((d,i)=>d.classList.toggle('on',i<code.length)); }
  function press(k){
    e.textContent='';
    if(k==='clr'){ code=''; return render(); }
    if(k==='del'){ code=code.slice(0,-1); return render(); }
    if(code.length>=LEN) return;
    code+=k; render();
    if(code.length===LEN) submit(code);
  }
  document.getElementById('pad').addEventListener('click',ev=>{ const b=ev.target.closest('.key'); if(b) press(b.dataset.k); });
  addEventListener('keydown',ev=>{ if(/^[0-9]$/.test(ev.key)) press(ev.key); else if(ev.key==='Backspace') press('del'); else if(ev.key==='Escape') press('clr'); });

  async function submit(passcode){
    try{
      const r=await fetch('/api/auth',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({passcode})});
      if(r.ok){ e.style.color='#7df0c8'; e.textContent='Access granted.'; location.href='/'; return; }
      const j=await r.json().catch(()=>({}));
      e.textContent = j.error==='locked' ? 'Locked — too many attempts.' : 'Passcode not recognized.';
    }catch{ e.textContent='Network error.'; }
    code=''; render();
  }
</script>
</body>
</html>
