<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover"/>
<meta name="theme-color" content="#161311"/>
<title>Reel · Sona</title>
<link rel="stylesheet" href="/assets/sona.css"/>
</head>
<body class="sona-gate">
<div class="vignette"></div><div class="grain"></div>
<main class="gate-panel">
  <div class="ember-mark">
    <svg viewBox="0 0 48 48" aria-hidden="true"><defs>
      <linearGradient id="au" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="#F3CE86"/><stop offset=".5" stop-color="#E7A94C"/><stop offset="1" stop-color="#E1712B"/>
      </linearGradient></defs>
      <path fill="url(#au)" d="M24 3c1 7-3 11-7 15-2 2-4 5-4 9a11 11 0 0 0 22 0c0-5-3-8-6-12-1 3-3 4-5 5 2-6-1-12 0-17Z"/>
      <path fill="#161311" opacity=".22" d="M24 20c1 3-1 6-3 8-1 1-2 3-2 5a5 5 0 0 0 10 0c0-3-2-5-4-7 0 2-1 3-2 4 1-3 0-7 1-10Z"/>
    </svg>
  </div>
  <h1 class="app-name">Reel</h1>
  <p class="app-tag">Your media</p>
  <div class="pin-dots" id="dots"><i></i><i></i><i></i><i></i></div>
  <div class="keypad" id="pad">
    <div class="key" data-k="1">1</div><div class="key" data-k="2">2</div><div class="key" data-k="3">3</div>
    <div class="key" data-k="4">4</div><div class="key" data-k="5">5</div><div class="key" data-k="6">6</div>
    <div class="key" data-k="7">7</div><div class="key" data-k="8">8</div><div class="key" data-k="9">9</div>
    <div class="key fn" data-k="clr">Clr</div><div class="key" data-k="0">0</div><div class="key fn" data-k="del">Del</div>
  </div>
  <p class="gate-err" id="e"></p>
</main>
<div class="gate-foot"><b>Sona</b> · under your roof</div>
<script>
  const FIELD='pin', LEN=4;
  const e=document.getElementById('e'), dotsEl=document.getElementById('dots');
  let code='';
  const render=()=>dotsEl.querySelectorAll('i').forEach((d,i)=>d.classList.toggle('on',i<code.length));
  function press(k){
    e.textContent='';
    if(k==='clr'){ code=''; return render(); }
    if(k==='del'){ code=code.slice(0,-1); return render(); }
    if(code.length>=LEN) return;
    code+=k; render();
    if(code.length===LEN) submit(code);
  }
  document.getElementById('pad').addEventListener('click',ev=>{const b=ev.target.closest('.key'); if(b) press(b.dataset.k);});
  addEventListener('keydown',ev=>{ if(/^[0-9]$/.test(ev.key)) press(ev.key); else if(ev.key==='Backspace') press('del'); else if(ev.key==='Escape') press('clr'); });
  async function submit(v){
    try{
      const r=await fetch('/api/auth',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({[FIELD]:v})});
      if(r.ok){ e.style.color='var(--sage)'; e.textContent='Welcome home.'; location.href='/'; return; }
      const j=await r.json().catch(()=>({}));
      e.textContent = (j.error==='locked'||r.status===429) ? 'Locked — too many tries.' : 'That’s not the key.';
    }catch{ e.textContent='Network error.'; }
    code=''; render();
  }
</script>
</body>
</html>
